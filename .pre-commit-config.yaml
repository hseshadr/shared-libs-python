repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: check-toml
      - id: check-merge-conflict
      - id: debug-statements

  # Revisions track the versions pinned in pyproject.toml, so a pre-commit run
  # and `uv run poe gate` cannot disagree about what passes.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v2.3.0
    hooks:
      - id: mypy
        # `types-all` was a meta-package that has been an empty no-op stub for
        # years — it installed no stubs, so this hook was type-checking against
        # nothing extra. pydantic ships its own types and is the only
        # dependency whose types matter here.
        additional_dependencies: [pydantic>=2.13.4]
        args: [--strict, --ignore-missing-imports]
        files: ^edgeproc_core/



name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Mirrors `uv run poe gate` exactly (house standard §3): the gate IS the CI.
  # Steps inside the gate: ruff lint -> ruff format --check -> mypy strict ->
  # xenon A -> pytest (>=90% coverage, writes coverage.xml).
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        # No floating v8 tag exists for setup-uv — full version pin required.
        uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run the gate
        run: uv run poe gate

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # Full-history secret scan (house standard §4). GITLEAKS_LICENSE is not
  # needed: this is a personal account, not an organization.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0 # full history — gitleaks scans every commit

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

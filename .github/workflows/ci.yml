name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Mirrors `uv run poe gate` exactly (house standard §3): the gate IS the CI.
  # Steps inside the gate: ruff lint -> ruff format --check -> mypy strict ->
  # xenon A -> pytest (>=90% coverage, writes coverage.xml).
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history + tags: the changelog-provenance test compares every
          # released section against that section at its own tag. Without tags
          # it skips, and a skipped provenance check is no check at all.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        # No floating v8 tag exists for setup-uv — full version pin required.
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run the gate
        run: uv run poe gate

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          files: ./coverage.xml
          fail_ci_if_error: false

  # Full-history secret scan (house standard §4). GITLEAKS_LICENSE is not
  # needed: this is a personal account, not an organization.
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0 # full history — gitleaks scans every commit

      - uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

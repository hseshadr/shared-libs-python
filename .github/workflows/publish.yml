name: Publish Package

on:
  push:
    tags:
      - 'v*'

# Least privilege: default the whole workflow to read-only. Only the `release`
# job — the single step that creates a GitHub Release — is granted contents:write.
permissions:
  contents: read

jobs:
  # Zero-defect release rule: nothing builds or publishes unless the full
  # quality gate passes on the tagged commit. Mirrors ci.yml / `poe gate`
  # exactly: ruff lint -> ruff format --check -> mypy strict -> xenon A ->
  # pytest (>=90% coverage).
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Run the gate
        run: uv run poe gate

  build:
    needs: gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"

      - name: Install build dependencies
        run: |
          uv pip install --system build

      - name: Extract version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Update version in pyproject.toml
        # Route the tag-derived version through an env var (never interpolate a
        # ${{ }} expression straight into the shell) so a crafted tag name can't
        # inject shell/sed commands. Anchor ^version to the project version line.
        env:
          VERSION: ${{ steps.get_version.outputs.VERSION }}
        run: |
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" pyproject.toml

      - name: Build package
        run: python -m build

      - name: Upload build artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dist
          path: dist/

  release:
    needs: [gate, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Only this job creates a GitHub Release.
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: dist
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          files: dist/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

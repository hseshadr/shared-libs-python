# edgeproc-core — .github/workflows/publish.yml
# PyPI release via OIDC Trusted Publishing. A `v*` tag push is the whole trigger; there is
# NO PyPI token in this repo. This REPLACES the previous token/build + GitHub-Release flow:
# the reusable python-publish workflow re-runs `uv run poe gate` on the tagged ref and then
# publishes via OIDC (short-lived token, PEP 740 attestations) — no stored API token.
#
# One-time bootstrap (deferred — needs a human): register the GitHub Actions trusted
# publisher on PyPI as a PENDING publisher (edgeproc-core is not yet on PyPI). After
# the first OIDC publish creates the project, every `git tag vX.Y.Z && git push --tags`
# releases automatically. The workflow filename + repo + owner ARE the credential.
#
# NOTE: hseshadr/ci is pinned to a full commit SHA, not the moving `ci-v2` tag — a tag can be
# repointed at new code, a SHA cannot. The trailing comment records which release that SHA is;
# Dependabot's `github-actions` ecosystem bumps both the pin and the comment on a new release.
name: Publish (PyPI, OIDC)
on:
  push:
    tags: ["v*"]
# Top-level read-only; the OIDC write scope is granted on the publish job only (the ci repo
# security policy forbids a top-level `id-token: write`).
permissions:
  contents: read
jobs:
  publish:
    permissions:
      id-token: write # OIDC — PyPI verifies this against the registered trusted publisher.
      contents: read
    uses: hseshadr/ci/.github/workflows/python-publish.yml@102e06c2da82e3a201bd7aee4fb8c3e4554593a6 # ci-v2.0.2
    with:
      working-directory: "."
      sync-args: "--frozen --all-extras"
